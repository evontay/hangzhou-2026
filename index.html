<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州 · 苏州 — 家庭旅行手记，2026年5月</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #3d3d3d;
    --ink-mid: #5a5a5a;
    --paper: #f7f3ea;
    --paper-warm: #ede5d3;
    --rice: #fbf8f0;
    --jade: #3a5a4d;
    --jade-deep: #1f3528;
    --vermilion: #9c2a2a;
    --vermilion-deep: #6e1818;
    --gold: #a07c3a;
    --mist: #b8b4a7;
    --line: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--rice);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- LANDING WRAPPER ---------- */
  .landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    border-bottom: 2px solid var(--line);
  }

  /* ---------- TOP MARK ---------- */
  .landing-mark {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .landing-mark .seal {
    width: 64px;
    height: 64px;
    border: 2px solid var(--vermilion);
    color: var(--vermilion);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 600;
    transform: rotate(-3deg);
  }

  /* ---------- CENTRE CONTENT ---------- */
  .landing-center {
    text-align: center;
    padding: 80px 0 60px;
  }

  .landing-eyebrow {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: var(--vermilion);
    letter-spacing: 0.45em;
    margin-bottom: 48px;
    font-weight: 500;
  }

  .landing-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(64px, 10vw, 140px);
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .landing-title .cn {
    font-family: 'Noto Serif SC', serif;
    color: var(--jade-deep);
    letter-spacing: 0.1em;
  }

  .landing-title .divider {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--mist);
    font-size: 0.6em;
    padding: 0 0.2em;
  }

  .landing-title .en {
    font-style: italic;
    color: var(--ink-soft);
  }

  .landing-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(20px, 2vw, 26px);
    color: var(--ink-mid);
    margin-top: 32px;
    letter-spacing: 0.04em;
  }

  /* ---------- LANGUAGE BUTTONS ---------- */
  .landing-langs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 2px solid var(--line);
  }

  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 32px;
    text-decoration: none;
    color: var(--ink);
    border-right: 1px solid var(--mist);
    transition: background 0.25s ease, color 0.25s ease;
    cursor: pointer;
  }
  .lang-btn:last-child { border-right: none; }

  .lang-btn:hover { background: var(--ink); color: var(--rice); }
  .lang-btn:hover .lang-btn-label { color: inherit; }
  .lang-btn:hover .lang-btn-sub { color: var(--mist); }

  .lang-btn-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 6vw, 80px);
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    transition: color 0.25s ease;
  }
  .lang-btn-zh .lang-btn-label {
    font-family: 'Noto Serif SC', serif;
    letter-spacing: 0.15em;
  }

  .lang-btn-sub {
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 14px;
    font-weight: 600;
    transition: color 0.25s ease;
  }
  .lang-btn-zh .lang-btn-sub {
    letter-spacing: 0.2em;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 600px) {
    .landing { padding: 28px 24px; }
    .landing-center { padding: 48px 0 40px; }
    .landing-langs { grid-template-columns: 1fr; }
    .lang-btn { border-right: none; border-bottom: 1px solid var(--mist); padding: 32px 24px; }
    .lang-btn:last-child { border-bottom: none; }
  }
</style>
</head>
<body>

<div class="landing">

  <div class="landing-mark">
    <div>
      <div>A Family Travel Journal</div>
      <div style="margin-top:4px;font-family:'Noto Serif SC',serif;letter-spacing:0.2em;text-transform:none;">家庭旅行手记</div>
    </div>
    <div class="seal">遊</div>
  </div>

  <div class="landing-center">
    <div class="landing-eyebrow">上有天堂 · 下有蘇杭</div>
    <h1 class="landing-title">
      <span class="cn">杭州</span><span class="divider"> · </span><span class="cn">蘇州</span>
      <br>
      <span class="en" style="font-size:0.45em;">Hangzhou &amp; Suzhou</span>
    </h1>
    <div class="landing-date">May 2026 &nbsp;·&nbsp; 二〇二六年五月</div>
  </div>

  <div class="landing-langs">
    <a href="en.html" class="lang-btn lang-btn-en">
      <span class="lang-btn-label">English</span>
      <span class="lang-btn-sub">Read itinerary</span>
    </a>
    <a href="zh.html" class="lang-btn lang-btn-zh">
      <span class="lang-btn-label">中文版</span>
      <span class="lang-btn-sub">查看行程手册</span>
    </a>
  </div>

</div>

</body>
</html>
